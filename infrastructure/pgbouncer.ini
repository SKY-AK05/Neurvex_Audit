[databases]
nd_audit = host=your-server.postgres.database.azure.com port=5432 dbname=nd_audit

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 50
reserve_pool_size = 10
server_tls_sslmode = require
