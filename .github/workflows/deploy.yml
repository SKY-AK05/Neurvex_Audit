name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name neuromarkregistry

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VITE_MSAL_CLIENT_ID=2f900af5-c166-4fdb-90f1-1eaee09eeff2 \
            --build-arg VITE_MSAL_TENANT_ID=${{ secrets.NEUROMARKAPP_AZURE_TENANT_ID }} \
            -t neuromarkregistry.azurecr.io/orchvate-audit:${{ github.sha }} \
            -t neuromarkregistry.azurecr.io/orchvate-audit:latest .
          docker push neuromarkregistry.azurecr.io/orchvate-audit:${{ github.sha }}
          docker push neuromarkregistry.azurecr.io/orchvate-audit:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name neuromark-app \
            --resource-group NeuroMark_Audit \
            --image neuromarkregistry.azurecr.io/orchvate-audit:${{ github.sha }}
