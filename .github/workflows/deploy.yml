name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: |
          docker login neurvexregistry.azurecr.io \
            --username ${{ secrets.NEURVEXAPP_REGISTRY_USERNAME }} \
            --password ${{ secrets.NEURVEXAPP_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VITE_MSAL_CLIENT_ID=${{ secrets.NEURVEXAPP_AZURE_CLIENT_ID }} \
            --build-arg VITE_MSAL_TENANT_ID=${{ secrets.NEURVEXAPP_AZURE_TENANT_ID }} \
            -t neurvexregistry.azurecr.io/orchvate-audit:${{ github.sha }} \
            -t neurvexregistry.azurecr.io/orchvate-audit:latest .
          docker push neurvexregistry.azurecr.io/orchvate-audit:${{ github.sha }}
          docker push neurvexregistry.azurecr.io/orchvate-audit:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name neurvex-app \
            --resource-group Neurvex_Audit \
            --image neurvexregistry.azurecr.io/orchvate-audit:${{ github.sha }}
