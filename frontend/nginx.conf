server {
    listen 80;
    server_name _;

    root /app/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy all /api/ calls to the FastAPI backend running on localhost:8000
    # This is internal — uvicorn is NOT exposed outside the container
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — ACS email sends can take a few seconds
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Handle Vue Router (history mode) — always return index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
