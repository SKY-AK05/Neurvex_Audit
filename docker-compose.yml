version: "3.9"

services:

  # ── Python Backend (Azure Functions Runtime) ──────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchvate-audit-api
    ports:
      - "7071:80"
    env_file:
      - .env
    environment:
      - AzureWebJobsStorage=UseDevelopmentStorage=true
      - FUNCTIONS_WORKER_RUNTIME=python
    depends_on:
      - db
    restart: unless-stopped

  # ── Vue Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orchvate-audit-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── PostgreSQL (local dev only, use Azure PostgreSQL in production) ────────
  db:
    image: postgres:16-alpine
    container_name: orchvate-audit-db
    environment:
      POSTGRES_DB: nd_audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./create_table.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  pgdata:
